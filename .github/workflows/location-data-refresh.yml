name: Refresh GeoNames Location Index

on:
  schedule:
    - cron: "0 5 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build GeoNames index
        run: npm run location:build-index

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/location-index-refresh
          commit-message: "chore: refresh geonames location index"
          title: "chore: refresh geonames location index"
          body: |
            Automated monthly refresh of GeoNames-based location index.
          labels: |
            automation
            data-refresh
